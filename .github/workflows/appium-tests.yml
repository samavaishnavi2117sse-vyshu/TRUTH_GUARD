name: TruthGuard Appium Mobile Testing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mobile-tests:
    name: Run Appium E2E Mobile Tests (Python)
    runs-on: macos-13
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Python Dependencies
        run: |
          pip install -r appium-testing/requirements.txt

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Start Appium server in background
            appium &
            # Wait for Appium port 4723 to open
            timeout=60
            while ! nc -z localhost 4723; do
              sleep 1
              timeout=$((timeout - 1))
              if [ $timeout -le 0 ]; then
                echo "Appium server failed to start within 60 seconds."
                exit 1
              fi
            done
            echo "Appium server is up and running!"
            # Run mobile tests
            cd appium-testing
            python test.py

      - name: Upload Appium Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Mobile-Test-Report
          path: appium-testing/Appium_Test_Report.xlsx
