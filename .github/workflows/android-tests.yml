name: TruthGuard Android E2E Testing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-tests:
    name: 📱 Appium E2E Tests — 100 Test Cases
    runs-on: ubuntu-latest  # Picks up in ~30s; KVM gives full hardware acceleration

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. KVM HARDWARE ACCELERATION (required for Android emulator on Linux) ─
      - name: ⚡ Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 3. JDK ───────────────────────────────────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 4. NODE.JS & APPIUM ──────────────────────────────────────────────────
      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ── 5. PYTHON ────────────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'appium-testing/requirements.txt'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r appium-testing/requirements.txt

      # ── 6. BUILD DEBUG APK ───────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          echo "✅ APK built at: app/build/outputs/apk/debug/app-debug.apk"
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      # ── 7. RUN EMULATOR + APPIUM + TESTS ────────────────────────────────────
      #    The emulator-runner action:
      #      • boots API-33 x86_64 emulator with KVM
      #      • waits until boot_completed before calling our script
      #      • tears it down after the script exits
      - name: 📱 Run Appium E2E Tests (Emulator + Appium + Python)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          CI: 'true'
          APK_PATH: ${{ github.workspace }}/app/build/outputs/apk/debug/app-debug.apk
          AVD_NAME: 'test'   # emulator-runner creates an AVD named "test" by default
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: test
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Emulator is ready — listing devices ==="
            adb devices

            echo "=== Starting Appium server ==="
            appium --port 4723 --address 127.0.0.1 --log-level error \
              --base-path / &
            APPIUM_PID=$!
            echo "Appium PID: $APPIUM_PID"

            echo "=== Waiting 12s for Appium to bind ==="
            sleep 12

            echo "=== Running Python test suite ==="
            python appium-testing/test.py

            echo "=== Stopping Appium server ==="
            kill $APPIUM_PID 2>/dev/null || true

      # ── 8. PUBLISH STEP SUMMARY ──────────────────────────────────────────────
      - name: 📋 Publish Results to Actions Summary
        if: always()
        run: |
          if [ -f appium-testing/test-summary.md ]; then
            cat appium-testing/test-summary.md >> $GITHUB_STEP_SUMMARY
            echo "✅ Test summary published to GitHub Actions UI"
          else
            echo "## ⚠️ Test Summary Not Found" >> $GITHUB_STEP_SUMMARY
            echo "test-summary.md was not generated — check runner logs above." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 9. UPLOAD EXCEL REPORT ───────────────────────────────────────────────
      - name: 📤 Upload Excel Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium_E2E_Report_TruthGuard_Run-${{ github.run_number }}
          path: appium-testing/Appium_E2E_Report_*.xlsx
          retention-days: 90
          if-no-files-found: warn

      # ── 10. RESULT BANNER ────────────────────────────────────────────────────
      - name: 📋 How to Access the Report
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║    ✅ TruthGuard Appium E2E — Test Run Complete             ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  📊 View inline → Summary tab (left sidebar of this run)   ║"
          echo "║  📥 Download Excel → Artifacts section at bottom of run    ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
