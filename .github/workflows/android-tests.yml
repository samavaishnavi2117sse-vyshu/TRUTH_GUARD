name: TruthGuard Android E2E Testing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-tests:
    name: 📱 Appium E2E Tests — 100 Test Cases
    runs-on: ubuntu-latest  # Ubuntu supports KVM hardware acceleration and picks up instantly

    steps:
      # ── 1. CHECKOUT SOURCE CODE ──────────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. ENABLE KVM FOR HARDWARE ACCELERATION (Linux only) ─────────────────
      #    This is required for running Android emulators on Ubuntu runners.
      #    Without KVM, emulator runs at ~10x slower speed and often times out.
      - name: ⚡ Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 3. SETUP JAVA DEVELOPMENT KIT (JDK) ─────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 4. SETUP NODE.JS & APPIUM ───────────────────────────────────────────
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ── 5. SETUP PYTHON ─────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'appium-testing/requirements.txt'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r appium-testing/requirements.txt

      # ── 6. GRANT GRADLE EXECUTE PERMISSION ──────────────────────────────────
      - name: 🔧 Make gradlew Executable
        run: chmod +x gradlew

      # ── 7. BUILD DEBUG APK ──────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug

      # ── 8. RUN EMULATOR & EXECUTE APPIUM TESTS ──────────────────────────────
      #    reactivecircus/android-emulator-runner works on Ubuntu with KVM.
      #    Using api-level 33, x86_64 arch with gpu swiftshader for headless CI.
      - name: 📱 Run Appium E2E Test Suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Wait for emulator to be fully ready
            adb wait-for-device
            adb shell input keyevent 82

            # Start Appium server in background
            appium --port 4723 --address 127.0.0.1 --log-level error &
            APPIUM_PID=$!
            sleep 10

            # Run the Python test suite
            python appium-testing/test.py

            # Stop Appium
            kill $APPIUM_PID 2>/dev/null || true

      # ── 9. PUBLISH STEP SUMMARY ─────────────────────────────────────────────
      - name: 📋 Publish Test Results to Step Summary
        if: always()
        run: |
          if [ -f appium-testing/test-summary.md ]; then
            cat appium-testing/test-summary.md >> $GITHUB_STEP_SUMMARY
            echo "✅ Test summary published to GitHub Actions UI"
          else
            echo "## ⚠️ Test Summary Not Found" >> $GITHUB_STEP_SUMMARY
            echo "The test-summary.md file was not generated. Check runner logs above." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 10. UPLOAD EXCEL ARCHIVE ─────────────────────────────────────────────
      - name: 📤 Upload Excel Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium_E2E_Report_TruthGuard_Run-${{ github.run_number }}
          path: appium-testing/Appium_E2E_Report_*.xlsx
          retention-days: 90
          if-no-files-found: warn

      # ── 11. PRINT RESULT BANNER ──────────────────────────────────────────────
      - name: 📋 How to Access the Test Report
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║    ✅ TruthGuard Appium E2E — Test Run Complete             ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  📊 OPTION 1 — View results inline (no download needed):    ║"
          echo "║     → Click the  Summary  tab on the left of this run page  ║"
          echo "║                                                              ║"
          echo "║  📥 OPTION 2 — Download full Excel report:                  ║"
          echo "║     → Scroll to BOTTOM of this run page → Artifacts section ║"
          echo "║     → Click: Appium_E2E_Report_TruthGuard_Run-${{ github.run_number }}           ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
